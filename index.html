<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>仲南莲的私人网站 · 夺妻为后</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f0eb 0%, #e8e0d6 100%);
            color: #1a120b;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* 液态玻璃风格 */
        .glass {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 28px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #e2d8cf; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #b88a5c; border-radius: 10px; }

        .app {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(255, 248, 240, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            margin-bottom: 1.5rem;
            padding: 0.5rem 1.5rem;
            position: sticky;
            top: 1rem;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #5c3a21, #c17b42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo i { color: #c17b42; margin-right: 6px; background: none; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #4a3724; font-weight: 500; transition: 0.2s; cursor: default; }
        .nav-links a:hover { color: #c96f3e; }
        .visitor-count {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #5c3a21;
        }
        .visitor-count i { color: #c96f3e; margin-right: 5px; }

        /* Hero 区域 */
        .hero {
            background: linear-gradient(112deg, rgba(254, 249, 240, 0.7) 0%, rgba(246, 242, 235, 0.7) 100%);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .hero-badge {
            background: rgba(192, 111, 58, 0.15);
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #b45f2b;
            margin-bottom: 1rem;
        }
        .hero-content h1 { font-size: 2rem; font-weight: 700; color: #3e2a1c; }
        .media-tag { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
        .pill {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        .main-container { padding: 0; }
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.2rem;
            border-left: 4px solid #c96f3e;
            padding-left: 1rem;
        }
        .section-title h2 { font-size: 1.4rem; font-weight: 600; }

        /* 小说卡片 */
        .novel-showcase {
            background: rgba(255, 252, 245, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
        }
        .novel-card-large {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 1.5rem;
            display: flex;
            gap: 2rem;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .novel-card-large:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.2);
            border-color: rgba(201, 111, 62, 0.3);
        }
        .novel-cover-large {
            width: 110px;
            height: 130px;
            background: linear-gradient(145deg, #f0e4d8, #e2d0be);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #c17b42;
        }
        .novel-info-large h3 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem; }
        .novel-meta-large { font-size: 0.8rem; color: #7a6248; margin-bottom: 0.5rem; display: flex; gap: 1rem; flex-wrap: wrap; }
        .read-badge {
            margin-top: 0.8rem;
            display: inline-block;
            background: rgba(201, 111, 62, 0.9);
            color: white;
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .chapters-preview {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px dashed rgba(160, 120, 80, 0.3);
        }
        .chapter-links { display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .chapter-link {
            background: rgba(240, 235, 225, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .chapter-link:hover {
            background: #c96f3e;
            color: white;
            border-color: transparent;
        }

        /* 评论区 */
        .comments-section {
            background: rgba(255, 252, 245, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .comment-form {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            padding: 1rem;
            border-radius: 24px;
            margin-bottom: 1.2rem;
        }
        .comment-input-group input,
        .comment-input-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid rgba(160, 120, 80, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.7);
            font-family: inherit;
            outline: none;
        }
        .comment-input-group input:focus,
        .comment-input-group textarea:focus {
            border-color: #c96f3e;
            background: white;
        }
        .submit-comment {
            background: rgba(201, 111, 62, 0.9);
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
        }
        .comment-item {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            padding: 0.8rem;
            border-radius: 20px;
            margin-bottom: 0.6rem;
            border-left: 3px solid #c96f3e;
        }
        .comment-name { display: flex; justify-content: space-between; align-items: center; }
        .comment-time { font-size: 0.7rem; color: #aa9b8a; }
        .empty-comments { text-align: center; padding: 1.5rem; color: #aa9b8a; }

        /* 阅读器模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 20, 15, 0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .reader-container {
            background: rgba(254, 247, 232, 0.95);
            backdrop-filter: blur(16px);
            width: 850px;
            max-width: 90vw;
            height: 85vh;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
        }
        .reader-header {
            padding: 1rem 1.5rem;
            background: rgba(255, 242, 225, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(160, 120, 80, 0.2);
        }
        .reader-content {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            font-size: 1rem;
            line-height: 1.75;
            font-family: 'Georgia', serif;
            color: #2c241a;
        }
        .chapter-selector {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .chapter-btn {
            background: rgba(240, 230, 215, 0.7);
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .chapter-btn.active {
            background: #c96f3e;
            color: white;
        }
        .close-reader {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #8b694c;
        }
        .loading-spinner { text-align: center; padding: 2rem; color: #ad8b67; }
        .error-placeholder { color: #c96f3e; text-align: center; padding: 2rem; }
        footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.7rem;
            color: #7a6248;
        }
        @media (max-width: 700px) {
            .novel-card-large { flex-direction: column; text-align: center; }
            .navbar { margin: 0 0.5rem 1rem 0.5rem; }
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1100;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="navbar">
        <div class="nav-container">
            <div class="logo"><i class="fas fa-feather-alt"></i> 仲南莲的私人网站</div>
            <div class="nav-links">
                <a href="#">首页</a>
                <a href="#">文字馆</a>
                <div class="visitor-count" id="visitorCountDisplay"><i class="fas fa-users"></i> 加载中...</div>
                <div class="user-icon"><i class="fas fa-user"></i></div>
            </div>
        </div>
    </div>

    <div class="hero">
        <div class="hero-content">
            <div class="hero-badge"><i class="fas fa-book-open"></i> 仲南莲 · 私人阅读空间</div>
            <h1>文字是灵魂的栖居之所</h1>
            <div class="media-tag">
                <span class="pill"><i class="fas fa-feather-alt"></i> 独家连载《夺妻为后》</span>
                <span class="pill"><i class="fas fa-heart"></i> 权谋 · 虐恋 · 棋局</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="novel-showcase">
            <div class="section-title">
                <h2><i class="fas fa-quote-left"></i> 正在热读 · 夺妻为后</h2>
                <span class="more-link">🔥 月下惊鸿 作品</span>
            </div>
            <div class="novel-card-large" id="novelMainCard">
                <div class="novel-cover-large"><i class="fas fa-crown"></i></div>
                <div class="novel-info-large">
                    <h3>夺妻为后</h3>
                    <div class="novel-meta-large">
                        <span><i class="fas fa-user"></i> 月下惊鸿</span>
                        <span><i class="fas fa-file-alt"></i> 连载中</span>
                        <span><i class="fas fa-star"></i> 强取豪夺 · 宫廷权谋</span>
                    </div>
                    <div class="read-badge"><i class="fas fa-book-reader"></i> 点击卡片开始阅读</div>
                </div>
            </div>
            <div class="chapters-preview">
                <h4><i class="fas fa-list"></i> 章节导航</h4>
                <div class="chapter-links" id="chapterLinksContainer">
                    <span class="chapter-link">加载章节列表...</span>
                </div>
                <p style="font-size:0.7rem; color:#aa8b6e; margin-top:8px;">
                    <i class="fas fa-info-circle"></i> 章节列表由 novels/manifest.json 自动生成
                </p>
            </div>
        </div>

        <div class="comments-section">
            <div class="comments-header" style="display:flex; gap:8px; align-items:center; margin-bottom:1rem;">
                <i class="fas fa-comments" style="color:#c96f3e; font-size:1.3rem;"></i>
                <h3 style="font-size:1.2rem;">读者留言</h3>
            </div>
            <div class="comment-form">
                <div class="comment-input-group"><input type="text" id="commentName" placeholder="你的称呼 (选填，默认显示匿名读者)"></div>
                <div class="comment-input-group"><textarea id="commentText" placeholder="写下你的阅读感受或建议... (必填)" maxlength="500"></textarea></div>
                <button class="submit-comment" id="submitCommentBtn"><i class="fas fa-paper-plane"></i> 留下足迹</button>
            </div>
            <div class="comments-list" id="commentsList"><div class="empty-comments">✨ 暂无留言，来做第一个留言的人吧 ✨</div></div>
        </div>
    </div>
    <footer><p>© 仲南莲的私人网站 · 文字的温度 | 沉淀时光，静读好文</p></footer>
</div>

<div id="readerModal" class="modal-overlay">
    <div class="reader-container">
        <div class="reader-header"><h3 id="readerTitle">夺妻为后</h3><button class="close-reader" id="closeReaderBtn">&times;</button></div>
        <div class="reader-content" id="readerContent"><div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> 加载章节...</div></div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ================= 配置：novels 文件夹路径 =================
    // 文件结构：novel-website/novels/ 下存放 manifest.json 和所有 .txt 章节文件
    const NOVELS_FOLDER = "novels/";
    
    let chaptersList = [];      // [{ index, filename, title }]
    let currentChapterIndex = 0;
    let chapterCache = {};

    // 唯一可靠的读取方式：manifest.json
    async function loadFromManifest() {
        try {
            const response = await fetch(`${NOVELS_FOLDER}manifest.json`);
            if (!response.ok) {
                throw new Error('manifest.json 不存在');
            }
            const manifest = await response.json();
            if (manifest.chapters && Array.isArray(manifest.chapters) && manifest.chapters.length > 0) {
                chaptersList = manifest.chapters.map((ch, idx) => ({
                    index: idx,
                    filename: `${NOVELS_FOLDER}${ch.file}`,
                    title: ch.title || ch.file.replace(/\.txt$/i, '')
                }));
                return true;
            }
        } catch (e) {
            console.error('加载 manifest.json 失败:', e);
        }
        return false;
    }

    // 初始化章节列表
    async function initChapters() {
        const container = document.getElementById('chapterLinksContainer');
        const success = await loadFromManifest();
        
        if (!success || chaptersList.length === 0) {
            container.innerHTML = `
                <div style="color:#c96f3e; width:100%; padding:0.5rem 0;">
                    ⚠️ 未找到 novels/manifest.json 文件<br>
                    <span style="font-size:0.75rem;">请按以下步骤操作：<br>
                    1. 在 novels 文件夹中创建 manifest.json<br>
                    2. 格式：{ "chapters": [ {"file": "第一章.txt", "title": "第一章 · 标题"}, ... ] }<br>
                    3. 确保对应的 .txt 文件存在且为 UTF-8 编码
                    </span>
                </div>
            `;
            return false;
        }
        
        container.innerHTML = '';
        chaptersList.forEach(ch => {
            const link = document.createElement('span');
            link.className = 'chapter-link';
            link.innerText = ch.title;
            link.onclick = () => openReader(ch.index);
            container.appendChild(link);
        });
        return true;
    }

    // 加载章节内容
    async function loadChapterContent(index) {
        if (chapterCache[index]) return chapterCache[index];
        const ch = chaptersList[index];
        if (!ch) return '<div class="error-placeholder">章节不存在</div>';
        
        try {
            const resp = await fetch(ch.filename);
            if (!resp.ok) {
                throw new Error(`HTTP ${resp.status}`);
            }
            let text = await resp.text();
            // 转义HTML
            text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // 段落处理：双换行分段
            let html = text.split(/\n\n+/).map(para => {
                let inner = para.replace(/\n/g, '</p><p>  ');
                return `<p>  ${inner}</p>`;
            }).join('');
            // 如果没有双换行，按单换行处理
            if (html.length < 50 && text.includes('\n')) {
                html = `<p>  ${text.replace(/\n/g, '</p><p>  ')}</p>`;
            }
            html = `<div style="margin-bottom:1.2rem;"><span style="background:#c96f3e; color:white; padding:0.2rem 1rem; border-radius:30px;">${ch.title}</span></div>${html}<p style="text-align:right; margin-top:1.2rem;">—— ${ch.title} 完 ——</p>`;
            chapterCache[index] = html;
            return html;
        } catch(e) {
            console.error('加载失败:', e);
            return `<div class="error-placeholder">❌ 加载失败: ${ch.filename}<br>请确保文件存在且为 UTF-8 编码</div>`;
        }
    }

    async function openReader(index) {
        if (!chaptersList.length) { showToast('暂无章节，请检查 novels/manifest.json 配置'); return; }
        currentChapterIndex = index;
        const modal = document.getElementById('readerModal');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        await renderReader();
    }

    async function renderReader() {
        const contentDiv = document.getElementById('readerContent');
        document.getElementById('readerTitle').innerText = '夺妻为后';
        
        let selectorHtml = '<div class="chapter-selector">';
        chaptersList.forEach((ch, idx) => {
            selectorHtml += `<button class="chapter-btn ${idx === currentChapterIndex ? 'active' : ''}" data-index="${idx}">${escapeHtml(ch.title)}</button>`;
        });
        selectorHtml += '</div>';
        
        const chapterHtml = await loadChapterContent(currentChapterIndex);
        contentDiv.innerHTML = selectorHtml + chapterHtml;
        
        // 绑定切换事件
        document.querySelectorAll('.chapter-btn').forEach(btn => {
            btn.onclick = async () => {
                const idx = parseInt(btn.getAttribute('data-index'));
                if (!isNaN(idx) && idx !== currentChapterIndex) {
                    currentChapterIndex = idx;
                    contentDiv.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> 加载中...</div>';
                    await renderReader();
                }
            };
        });
    }

    // ================= 辅助功能 =================
    function initVisitorCount() {
        let c = localStorage.getItem('site_visitor_count');
        c = c ? parseInt(c) + 1 : 1;
        localStorage.setItem('site_visitor_count', c);
        const display = document.getElementById('visitorCountDisplay');
        if (display) display.innerHTML = `<i class="fas fa-users"></i> 总访问 ${c} 人次`;
    }

    let comments = [];
    function loadComments() {
        const stored = localStorage.getItem('novel_comments');
        comments = stored ? JSON.parse(stored) : [];
        renderComments();
    }
    function renderComments() {
        const container = document.getElementById('commentsList');
        if (!container) return;
        if (!comments.length) {
            container.innerHTML = '<div class="empty-comments">✨ 暂无留言，来做第一个留言的人吧 ✨</div>';
            return;
        }
        container.innerHTML = comments.slice().reverse().map(c => `
            <div class="comment-item">
                <div class="comment-name">
                    <span><i class="fas fa-user-circle"></i> ${escapeHtml(c.name)}</span>
                    <span class="comment-time">${escapeHtml(c.time)}</span>
                </div>
                <div class="comment-text">${escapeHtml(c.text)}</div>
            </div>
        `).join('');
    }
    function addComment(name, text) {
        if (!text.trim()) { showToast('请填写留言内容~'); return false; }
        const comment = {
            id: Date.now(),
            name: name.trim() === '' ? '匿名读者' : name.trim().substring(0, 30),
            text: text.trim().substring(0, 500),
            time: new Date().toLocaleString('zh-CN')
        };
        comments.push(comment);
        localStorage.setItem('novel_comments', JSON.stringify(comments));
        // 导出为TXT
        let content = `仲南莲的私人网站 - 留言记录\n生成时间：${new Date().toLocaleString()}\n${'='.repeat(50)}\n`;
        comments.forEach((c, i) => {
            content += `[${i+1}] ${c.time} | ${c.name}:\n${c.text}\n${'-'.repeat(40)}\n`;
        });
        const blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `comments_${Date.now()}.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
        renderComments();
        showToast('留言已保存');
        return true;
    }
    function showToast(msg) {
        const t = document.getElementById('toastMsg');
        if (!t) return;
        t.innerText = msg;
        t.style.opacity = '1';
        setTimeout(() => { if (t) t.style.opacity = '0'; }, 2500);
    }
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }
    function closeReader() {
        const modal = document.getElementById('readerModal');
        if (modal) modal.style.display = 'none';
        document.body.style.overflow = '';
    }

    async function init() {
        initVisitorCount();
        loadComments();
        const hasChapters = await initChapters();
        const mainCard = document.getElementById('novelMainCard');
        if (hasChapters && chaptersList.length > 0) {
            if (mainCard) mainCard.onclick = () => openReader(0);
        } else {
            if (mainCard) {
                mainCard.style.opacity = '0.6';
                mainCard.style.cursor = 'not-allowed';
            }
        }
        const submitBtn = document.getElementById('submitCommentBtn');
        if (submitBtn) {
            submitBtn.onclick = () => {
                const nameInput = document.getElementById('commentName');
                const textInput = document.getElementById('commentText');
                addComment(nameInput ? nameInput.value : '', textInput ? textInput.value : '');
                if (textInput) textInput.value = '';
            };
        }
        const closeBtn = document.getElementById('closeReaderBtn');
        if (closeBtn) closeBtn.onclick = closeReader;
        const modalBg = document.getElementById('readerModal');
        if (modalBg) modalBg.onclick = (e) => { if (e.target === modalBg) closeReader(); };
    }
    init();
</script>
</body>
</html>
