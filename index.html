    // 第一章完整内容
    const chapter1Content = `
        <div style="display:flex; gap:1rem; align-items:center; margin-bottom:1.5rem;">
            <span style="background:#c96f3e; color:white; padding:0.2rem 1rem; border-radius:30px; font-size:0.8rem;">第一章</span>
            <span style="color:#ad8b67;">初见 · 棋子入局</span>
        </div>
        <p>  下午七点半，下班高峰期的街道被车流和人群填满，所有人脸上都带着解放的喜悦，脚步轻快地奔向各自的夜晚。只有唐梓琪一个人逆着人流，走得又慢又沉，像一只被潮水冲上岸的鱼。</p>
        <p>  她刚从锦泰集团的人事部出来，手里捏着一个薄薄的信封——一个月工资的遣散费。人事经理的话还在耳边回响：“小唐啊，不是你的能力有问题，实在是……麦总的决定，我们也很难办。”</p>
        <p>  麦总。麦田。</p>
        <p>  唐梓琪攥紧了信封，指节发白。她今年二十岁，高中毕业就没再读书，凭着自学的英日双语和一股不要命的拼劲，在锦泰做了两年秘书。从复印文件、端茶倒水做起，硬生生爬到了总裁秘书的位置。可就因为她在部门会议上指出了麦田方案里的一个数据错误，第二天就被通知卷铺盖走人。</p>
        <p>  二十岁，没学历，没背景，刚丢了工作。</p>
        <p>  她深吸一口气，把信封塞进帆布包，继续往前走。七月的晚风又闷又热，吹在身上黏糊糊的，像裹了一层保鲜膜。她走了快两个小时，从锦泰大厦一直走到老城区，沿街的店铺从光鲜的写字楼变成了油腻的小饭馆，帆布鞋底磨得发烫，脚后跟隐隐作痛。</p>
        <p>  她在一个公交站台停下来，掏出手机刷招聘软件。翻了三页，一个合适的都没有。要么要求大专以上学历，要么要求三年工作经验——她哪样都没有。她苦笑了一下，把手机收起来，在路边的台阶上坐了下来。</p>
        <p>  也是在这个时候，她看见了刘潇潇。</p>
        <p>  准确地说，是先看见了那辆车。一辆磨砂黑色的保时捷Panamera停在马路对面，车身低伏，像一头正在休憩的猎豹。唐梓琪不认识车，但她认识车牌——本A·88888，全城找不出第二辆。她在锦泰的时候听同事八卦过，这个车牌属于刘氏集团的少东家，二十岁接手家族企业，三年之内把市值翻了四倍，媒体给他起了个外号叫“冷面佛”——因为那张脸长得像庙里供的佛像一样好看，也一样冰冷。</p>
        <p>  她没想过会在这里看见他本人。</p>
        <p>  保时捷的驾驶座车门打开，一个年轻男人走下来。黑色T恤，深灰工装裤，脚上一双限量款的AJ。他很年轻，看起来跟她差不多大，五官却已经有了成年男人的锋利线条——眉骨高挺，鼻梁笔直，薄唇微微抿着，下颌线干净利落，像用美工刀裁出来的。他靠在车门上，手指夹着一根没点的烟，低头看手机。屏幕的白光照亮他的脸，冷白冷白的，像冬天的月光。</p>
        <p>  刘潇潇。</p>
        <p>  唐梓琪不知道自己为什么站了起来。</p>
        <p>  可能是走累了，可能是脚太疼，也可能只是一瞬间涌上来的不甘心。她在锦泰见过太多仗着家世横行霸道的人，二十岁的麦田算一个，那些被他挤走的人算一群。她什么都没有，只有一个不肯认输的脑子。</p>
        <p>  而刘潇潇的秘书上周刚离职。刘氏集团正在招人。</p>
        <p>  她穿过马路，在离他三步远的地方停住。</p>
        <p>  “刘总。”她开口，声音比自己预想的要稳，“您需要一个秘书。”</p>
        <p>  刘潇潇抬起头，目光从手机屏幕移到她脸上。那双眼睛是深褐色的，瞳仁极黑，看人的时候不带任何温度，像在估价，又像在审视一件不属于这个世界的闯入者。他没有说话，只是把她从头到脚扫了一遍——被汗浸湿的白T恤、洗到发白的牛仔裤、磨毛了边的帆布包。</p>
        <p>  “你谁？”他问。嗓音很低，带着一点少年人特有的清冽，但语气里没有任何同龄人的温度。</p>
        <p>  “唐梓琪，锦泰集团前秘书，刚被辞退。”她语速很快，“两年秘书经验，精通英日双语，没有学历，没有证书，但锦泰过去一年经手的合同里有三分之一是我经手的初稿和校对。辞退原因是我指出了麦田方案里的数据错误。”</p>
        <p>  刘潇潇的眉梢几不可见地动了一下。</p>
        <p>  “你知道上一个秘书怎么走的？”</p>
        <p>  “知道。被你骂哭的。”</p>
        <p>  “你不怕？”</p>
        <p>  “我连工作都没了，还有什么好怕的。”</p>
        <p>  沉默。</p>
        <p>  晚风穿过他们之间的空隙，吹起唐梓琪额前碎发。她的心脏在胸腔里跳得又重又快，手心里全是汗，但她没有移开视线。她今年二十岁，什么都没有，所以什么都不怕失去。</p>
        <p>  刘潇潇忽然动了。他把那根没点的烟丢进垃圾桶，拉开车门，坐回驾驶座。唐梓琪的心往下一沉，以为他要走了，却看见他降下车窗，扔出来一样东西。</p>
        <p>  一张名片。</p>
        <p>  “明天上午八点，刘氏大厦四十八楼。”他发动车子，引擎低沉地咆哮起来，“迟到一分钟就不用来了。”</p>
        <p>  保时捷驶入车流，红色的尾灯很快消失在暮色里。唐梓琪低头看手里的名片，黑底金字，只有一个名字和一个手机号，简洁到近乎傲慢。她把名片翻过来，背面用马克笔写着四个字，字迹锋利得像刀刻——</p>
        <p>  “别让我失望。”</p>

        <p>  “你……”她声音有点哑，“你怎么知道我家地址？”</p>
        <p>  “你的档案上写的。”刘潇潇重新拿起筷子，夹了一片甜虾放进她的盘子里，“吃。吃完回去，麦田还在等你的回复。”</p>
        <p>  唐梓琪低头看着盘子里的甜虾，晶莹剔透的虾肉在灯光下泛着珍珠色的光。她没有坐下，而是用手背狠狠擦了一下眼睛，然后拿起筷子把虾塞进嘴里，嚼了两下咽下去。</p>
        <p>  “你的计划是什么？”她问，声音还带着鼻音，但已经重新稳下来了。</p>
        <p>  刘潇潇看着她把虾吃完，才开口。</p>
        <p>  “麦田喜欢玩游戏。”他说，“他安插内鬼，我也安插内鬼。他发照片挑衅，我派人保护。他以为自己在下一盘很大的棋，但他忘了一件事。”</p>
        <p>  “什么事？”</p>
        <p>  刘潇潇放下筷子，转头看她。那双深褐色的眼睛在日料店昏黄的灯光下显得格外深，像一口看不到底的古井。</p>
        <p>  “他把你送给了我。”他说，“这是他在整盘棋里犯的最大的错误。”</p>
        <p>  唐梓琪的心跳漏了一拍。</p>
        <p>  不是心动——她在心里反复告诉自己不是心动。是一个被当成棋子的人，忽然听见有人把她称作“错误”而不是“工具”，心里某个地方没出息地酸了一下。</p>
        <p>  “我不是你的。”她说。</p>
        <p>  “我知道。”刘潇潇转回去继续吃寿司，语气恢复了一贯的冷淡，“但在他眼里你是。只要他这么认为，他就会把所有注意力放在你身上。而你——”</p>
        <p>  他夹起最后一块海胆寿司，放进她的盘子里。</p>
        <p>  “你是他唯一掌控不了的人。以前不是，从现在开始，是。”</p>
        <p>  唐梓琪低头看着那块海胆寿司，忽然想起她第一次见到麦田的那个下午。麦田对她说的第一句话是“你很聪明，跟着我，不会让你吃亏”。</p>
        <p>  两年后，她被他当作棋子送给另一个男人。</p>
        <p>  而那个男人此刻正把最后一块海胆让给她，理由是——她是麦田唯一控制不了的人。</p>
        <p>  唐梓琪拿起筷子，夹起海胆寿司，一口吃掉。</p>
        <p>  “接下来怎么办？”她问。</p>
        <p>  刘潇潇拿起手机，打开微信，把麦田发来的照片转发给自己。然后他把手机还给唐梓琪，说：“接下来，你给他回消息。”</p>
        <p>  “回什么？”</p>
        <p>  “回——”他站起来去结账，从她身边走过的时候，轻飘飘地丢下几个字，“‘红烧肉咸了。我妈做的比你送的好吃。’”</p>
        <p>  唐梓琪愣了半秒，然后嘴角不受控制地弯了起来。</p>
        <p>  她拿起手机，原话打上去，点了发送。</p>
        <p>  三秒钟后，麦田的回复到了：</p>
        <p>  “哈哈哈哈哈。潇潇教的吧？他知道怎么激怒我，但他不知道你妈最喜欢吃什么口味的红烧肉。”</p>
        <p>  唐梓琪的笑容僵住了。</p>
        <p>  她盯着屏幕，手指微微发紧。</p>
        <p>  麦田又发了一条。</p>
        <p>  “加糖，少盐，八角放两颗。对吧？我在你家吃过。——三年前。”</p>
        <p>  唐梓琪的血一下子凉了。</p>
        <p>  三年前。她十七岁。</p>
        <p>  那时候她还没进锦泰，还没见过刘潇潇，还只是一个住在老城区、每天骑着自行车上下学的普通高中生。</p>
        <p>  麦田，在她十七岁的时候，就已经进过她的家。</p>
        <p>  她抬起头，看见刘潇潇站在收银台前，正低头看着手机。他似乎也收到了什么消息，眉心微微蹙了起来。</p>
        <p>  唐梓琪没有叫他。她只是把手机屏幕关掉，深呼吸了两次，然后站起来，拍了拍牛仔裤上的褶皱。</p>
        <p>  不管麦田什么时候开始布这个局，不管他认识她多久。</p>
        <p>  从现在开始，游戏规则变了。</p>
        <p>  她走到刘潇潇身边，仰头看他。</p>
        <p>  “走吧，”她说，“我们回四十八楼。三年前的事，我要全部告诉你。”</p>
        <p>  刘潇潇低头看她。那双深褐色的眼睛里，有什么东西微微动了一下，像冰面下的暗流。</p>
        <p>  “不瞒我了？”</p>
        <p>  “不瞒了。”唐梓琪说，“从现在开始，所有牌都摊在桌上。”</p>
        <p>  刘潇潇看了她两秒，然后转身推开了日料店的门。</p>
        <p>  “那就走吧，”他说，声音被午后的热风吹散，“我的合伙人。”</p>
        <p>  唐梓琪跟在他身后走出去。</p>
        <p>  正午的阳光兜头浇下来，热得让人喘不过气。但她的后背是凉的，因为麦田的阴影还贴在那里，像一件脱不掉的黑色外套。</p>
        <p>  没关系。</p>
        <p>  她走进刘氏大厦旋转门的那一刻，在心里对自己说了一句跟两天前一模一样的话。</p>
        <p>  只不过这次是另外一个版本。</p>
        <p>  “麦田，”她无声地开口，“你他妈不是认识我妈吗？”</p>
        <p>  “行，我让你认识认识我。”</p>
        <p style="text-align:right; margin-top:1.5rem;">—— 第三章完 ——</p>
    `;

    let currentChapter = 1;

    function renderTextNovels() {
        const container = document.getElementById('textNovelList');
        if (!container) return;
        container.innerHTML = novelsData.map(novel => `
            <div class="novel-item" data-id="${novel.id}">
                <div class="novel-cover-icon">
                    <i class="${novel.coverIcon}"></i>
                </div>
                <div class="novel-info">
                    <h3>${escapeHtml(novel.title)}</h3>
                    <div class="novel-meta">${novel.author} · ${novel.words} · ${novel.status}</div>
                    <div class="novel-meta" style="font-size:0.7rem;">⭐ 强取豪夺 · 已更新3章</div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.novel-item').forEach(item => {
            item.addEventListener('click', () => openNovelReader());
        });
    }

    function openNovelReader() {
        const modal = document.getElementById('readerModal');
        if (!modal) return;
        
        currentChapter = 1;
        renderChapterContent();
        
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function renderChapterContent() {
        const contentEl = document.getElementById('readerContent');
        const titleEl = document.getElementById('readerTitle');
        titleEl.innerText = '夺妻为后';
        
        const chapterSelectorHtml = `
            <div class="chapter-selector">
                <button class="chapter-btn ${currentChapter === 1 ? 'active' : ''}" data-chapter="1">第一章</button>
                <button class="chapter-btn ${currentChapter === 2 ? 'active' : ''}" data-chapter="2">第二章</button>
                <button class="chapter-btn ${currentChapter === 3 ? 'active' : ''}" data-chapter="3">第三章</button>
            </div>
        `;
        
        let content = '';
        if (currentChapter === 1) content = chapter1Content;
        else if (currentChapter === 2) content = chapter2Content;
        else content = chapter3Content;
        
        contentEl.innerHTML = chapterSelectorHtml + content;
        
        document.querySelectorAll('.chapter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const chapter = parseInt(btn.getAttribute('data-chapter'));
                if (!isNaN(chapter) && chapter !== currentChapter) {
                    currentChapter = chapter;
                    renderChapterContent();
                }
            });
        });
    }

    function renderVideoPlaylist() {
        const playlistDiv = document.getElementById('videoPlaylist');
        const videoPlayer = document.getElementById('mainVideo');
        if (!playlistDiv) return;
        playlistDiv.innerHTML = videoList.map((video, idx) => `
            <div class="video-thumb" data-video-id="${video.id}" data-src="${video.src}">
                <div class="thumb-icon"><i class="${video.thumbIcon}"></i></div>
                <div class="thumb-info">
                    <strong>${escapeHtml(video.title)}</strong>
                    <span style="font-size:0.7rem;">${escapeHtml(video.desc)}</span>
                </div>
            </div>
        `).join('');

        if (videoList.length > 0) {
            const firstVideo = videoList[0];
            videoPlayer.src = firstVideo.src;
            document.getElementById('videoCaption').innerText = firstVideo.title + " · " + firstVideo.desc;
            videoPlayer.load();
            videoPlayer.play().catch(e => console.log("自动播放受限"));
            const firstThumb = document.querySelector('.video-thumb');
            if (firstThumb) firstThumb.classList.add('active-video');
        }

        document.querySelectorAll('.video-thumb').forEach(thumb => {
            thumb.addEventListener('click', () => {
                const src = thumb.getAttribute('data-src');
                const titleText = thumb.querySelector('strong')?.innerText || '豪门婚约';
                const descText = thumb.querySelector('span')?.innerText || '';
                if (src) {
                    videoPlayer.src = src;
                    videoPlayer.load();
                    videoPlayer.play().catch(e=>console.log);
                    document.getElementById('videoCaption').innerText = titleText + " · " + descText;
                }
                document.querySelectorAll('.video-thumb').forEach(t => t.classList.remove('active-video'));
                thumb.classList.add('active-video');
            });
        });
    }

    function globalSearch(keyword) {
        if (!keyword.trim()) {
            alert("请输入关键词，例如：夺妻为后 或 豪门婚约");
            return;
        }
        const kw = keyword.toLowerCase();
        const matchedNovels = novelsData.filter(n => n.title.toLowerCase().includes(kw) || n.author.toLowerCase().includes(kw));
        const matchedVideos = videoList.filter(v => v.title.toLowerCase().includes(kw) || v.desc.toLowerCase().includes(kw));
        if (matchedNovels.length === 0 && matchedVideos.length === 0) {
            alert(`🔍 未找到关于“${keyword}”的内容。试试 “夺妻为后” 或 “豪门婚约”`);
        } else {
            let msg = `✨ 搜索结果：“${keyword}” ✨\n\n`;
            if (matchedNovels.length) msg += `📖 文字小说：${matchedNovels.map(n=>n.title).join(', ')}\n`;
            if (matchedVideos.length) msg += `🎬 视频内容：${matchedVideos.map(v=>v.title).join(', ')}\n`;
            msg += `\n💡 点击左侧小说卡片可阅读第一至三章，右侧视频列表可观看。`;
            alert(msg);
            if (matchedVideos.length) document.querySelector('.video-showcase').scrollIntoView({ behavior: 'smooth' });
            else if (matchedNovels.length) document.querySelector('.novel-cards').scrollIntoView({ behavior: 'smooth' });
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function closeReader() {
        const modal = document.getElementById('readerModal');
        if (modal) {
            modal.style.display = 'none';
            document.body.style.overflow = '';
        }
    }

    function init() {
        renderTextNovels();
        renderVideoPlaylist();

        const searchBtn = document.getElementById('globalSearchBtn');
        const searchInput = document.getElementById('globalSearch');
        if (searchBtn) searchBtn.addEventListener('click', () => globalSearch(searchInput.value));
        if (searchInput) searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') globalSearch(searchInput.value); });

        const closeBtn = document.getElementById('closeReaderBtn');
        if (closeBtn) closeBtn.addEventListener('click', closeReader);
        const modalBg = document.getElementById('readerModal');
        if (modalBg) modalBg.addEventListener('click', (e) => { if (e.target === modalBg) closeReader(); });
    }
    init();
</script>
